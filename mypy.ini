[mypy]
python_version = 3.11
ignore_missing_imports = True
warn_unused_ignores = False
disallow_untyped_defs = False
no_implicit_optional = True
# import-untyped: pandas/scipy/sklearn ship partial/absent stubs.
# union-attr: model attributes are Optional until fit() populates them (set-once).
# annotation-unchecked: bodies of untyped helpers are intentionally unchecked.
disable_error_code = import-untyped, annotation-unchecked, union-attr
