services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: wc2026
      POSTGRES_PASSWORD: wc2026
      POSTGRES_DB: wc2026
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wc2026"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://wc2026:wc2026@db:5432/wc2026
      WC2026_ADMIN_TOKEN: ${WC2026_ADMIN_TOKEN:-changeme-admin-token}
      WC2026_CORS_ORIGINS: "*"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pgdata:
